name: Generar Sprint Dashboard & Release Note

on:
  # Trigger manual desde GitHub UI
  workflow_dispatch:
    inputs:
      sprint_id:
        description: 'ID del sprint (dejar vacío para usar el sprint activo)'
        required: false
        type: string
      board_id:
        description: 'ID del board de Jira'
        required: false
        default: '650'
        type: string

  # Automático: lunes y jueves a las 9am (Argentina = UTC-3)
  schedule:
    - cron: '0 12 * * 1,4'   # 12:00 UTC = 09:00 ART

jobs:
  generate:
    name: Generar dashboards desde Jira
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Para hacer push de los HTML generados

    steps:
      - name: Checkout del repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          # No se necesitan librerías externas (usa urllib de stdlib)

      - name: Generar dashboards
        env:
          JIRA_URL:      ${{ secrets.JIRA_URL }}
          JIRA_USER:     ${{ secrets.JIRA_USER }}
          JIRA_TOKEN:    ${{ secrets.JIRA_TOKEN }}
          JIRA_BOARD_ID: ${{ inputs.board_id || '650' }}
        run: |
          SPRINT_ARG=""
          if [ -n "${{ inputs.sprint_id }}" ]; then
            SPRINT_ARG="--sprint-id ${{ inputs.sprint_id }}"
          fi

          python3 scripts/generate_dashboards.py \
            --jira-url    "$JIRA_URL" \
            --jira-user   "$JIRA_USER" \
            --jira-token  "$JIRA_TOKEN" \
            --board       "$JIRA_BOARD_ID" \
            --output-dir  "." \
            $SPRINT_ARG

      - name: Verificar archivos generados
        run: |
          echo "=== Archivos generados ==="
          ls -lh sprint-dashboard.html release-note-email.html
          echo "=== Sprint Dashboard: primeras líneas ==="
          head -5 sprint-dashboard.html

      - name: Commit y push de los dashboards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add sprint-dashboard.html release-note-email.html

          # Solo commitear si hay cambios
          if git diff --staged --quiet; then
            echo "Sin cambios en los dashboards."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "🚀 Dashboard actualizado — $TIMESTAMP"
            git push
            echo "✅ Push exitoso"
          fi

      - name: Resumen de ejecución
        if: always()
        run: |
          echo "### Resultado de la generación" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f sprint-dashboard.html ]; then
            echo "✅ **sprint-dashboard.html** generado correctamente" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **sprint-dashboard.html** NO fue generado" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f release-note-email.html ]; then
            echo "✅ **release-note-email.html** generado correctamente" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **release-note-email.html** NO fue generado" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 Ejecutado: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
